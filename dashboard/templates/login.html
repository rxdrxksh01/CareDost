<!DOCTYPE html>
<html>
<head>
    <title>CareDost — Doctor Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 12px; width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.25rem; }
        p { color: #666; font-size: 14px; margin-bottom: 1.5rem; }
        label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 0.4rem; color: #333; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 1rem; outline: none; }
        input:focus { border-color: #4f46e5; }
        button { width: 100%; padding: 11px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
        button:hover { background: #4338ca; }
        .error { background: #fef2f2; color: #dc2626; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
        .logo { font-size: 28px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🏥</div>
        <h1>CareDost</h1>
        <p>Doctor Dashboard — Sign in to continue</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" placeholder="doctor" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
